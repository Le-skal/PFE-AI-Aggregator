<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>

  <!-- Leaf shape (green, IT for Green theme) -->
  <path d="M16 6 C10 6 7 10 7 15 C7 20 10 24 16 26 C22 24 25 20 25 15 C25 10 22 6 16 6 Z" fill="#22c55e" opacity="0.15"/>

  <!-- AI circuit lines -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="16" y1="7" x2="16" y2="11.5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="20.5" x2="16" y2="25" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="11.5" y2="16" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.5" y1="16" x2="25" y2="16" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Diagonal lines -->
  <line x1="9.6" y1="9.6" x2="12.8" y2="12.8" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19.2" y1="19.2" x2="22.4" y2="22.4" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22.4" y1="9.6" x2="19.2" y2="12.8" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12.8" y1="19.2" x2="9.6" y2="22.4" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#22c55e"/>

  <!-- Small dots at cardinal points -->
  <circle cx="16" cy="7" r="1.2" fill="#4ade80"/>
  <circle cx="16" cy="25" r="1.2" fill="#4ade80"/>
  <circle cx="7" cy="16" r="1.2" fill="#4ade80"/>
  <circle cx="25" cy="16" r="1.2" fill="#4ade80"/>
</svg>
